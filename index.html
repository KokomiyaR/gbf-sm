<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBF Grid Simulator Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
       .custom-scrollbar::-webkit-scrollbar { width: 6px; }
       .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
       .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        input[type=range] { height: 6px; -webkit-appearance: none; background: #334155; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #3b82f6; cursor: pointer; border-radius: 50%; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- 武器マスターデータ ---
        // 実際の運用では外部JSONからFetchすることを推奨
        const MASTER_LIST = [
            // 火属性
            { id: "f_m3_1", name: "フェニックス・クレド", el: "火", type: "斧", cat: "マグナ3", skill: "Mブースト/技巧/攻刃", atk: 2800, hp: 450, mod: "Omega", boost: 20 },
            { id: "f_rev_1", name: "滅尽剣", el: "火", type: "剣", cat: "レヴァンス", skill: "通常攻刃/堅守/刹那", atk: 3200, hp: 500, mod: "Normal", canAwake: true },
            // 水属性
            { id: "w_rev_1", name: "シュレディンガー", el: "水", type: "刀", cat: "レヴァンス", skill: "奥義与ダメ/特殊上限/方陣攻刃", atk: 3100, hp: 420, mod: "Omega", canAwake: true },
            { id: "w_m3_1", name: "フルーレ・マグナ", el: "水", type: "剣", cat: "マグナ3", skill: "Mブースト/星醒/攻刃", atk: 2750, hp: 400, mod: "Omega", boost: 20 },
            // 土属性
            { id: "e_rev_1", name: "竜伐の剛牙", el: "土", type: "格闘", cat: "レヴァンス", skill: "通常攻刃/与ダメUP/技巧", atk: 3400, hp: 380, mod: "Normal", canAwake: true },
            { id: "e_wld_1", name: "極星拳", el: "土", type: "格闘", cat: "極星器", skill: "EX攻刃/連撃UP/属性バフ", atk: 3550, hp: 410, mod: "EX" },
            // 風属性
            { id: "v_rev_1", name: "セッテ・ディ・スパーダ", el: "風", type: "剣", cat: "レヴァンス", skill: "剣レゾナンス/攻撃UP", atk: 2950, hp: 480, mod: "EX", resonance: "剣" },
            { id: "v_m3_1", name: "ティアマト・ボルト・マグナ", el: "風", type: "銃", cat: "マグナ", skill: "方陣攻刃/背水", atk: 2450, hp: 300, mod: "Omega" },
            // 光属性
            { id: "l_rev_1", name: "シンメトリア", el: "光", type: "刀", cat: "レヴァンス", skill: "通常攻刃/技錬/堅守", atk: 3050, hp: 550, mod: "Normal", canAwake: true },
            { id: "l_pact_1", name: "ハルモニア", el: "光", type: "竪琴", cat: "リミテッド", skill: "約定(与ダメ)/ボルテージ", atk: 2600, hp: 350, mod: "EX", pact: 50000 },
            // 闇属性
            { id: "d_pact_1", name: "ペイン・アンド・ストレイン", el: "闇", type: "斧", cat: "リミテッド", skill: "約定(与ダメ)/ボルテージ", atk: 2550, hp: 340, mod: "EX", pact: 50000 },
            // 終末・共通
            { id: "opus_n", name: "絶対否定の剣(超越250)", el: "全", type: "剣", cat: "終末", skill: "通常攻刃/与ダメ/上限UP", atk: 4300, hp: 800, mod: "Normal", opus: true },
            { id: "opus_o", name: "永遠拒絶の剣(超越250)", el: "全", type: "剣", cat: "終末", skill: "方陣攻刃/与ダメ/上限UP", atk: 4300, hp: 800, mod: "Omega", opus: true }
        ];

        function App() {
            const [grid, setGrid] = useState(Array(10).fill(null));
            const [env, setEnv] = useState({ hp: 100, mainAura: 170, friendAura: 170, element: "火" });
            const = useState("");
            const [filterEl, setFilterEl] = useState("All");

            // --- 計算ロジック (Motocal準拠) ---
            const stats = useMemo(() => {
                let baseAtk = 0, baseHp = 0;
                let normAtk = 0, omegaAtk = 0, exAtk = 0;
                let normAura = 0, omegaAura = 0;
                let pactDmg = 0, capUp = 0;
                let weaponCounts = {};

                // 1. 各スロットの基礎値と武器種カウント
                grid.forEach(w => {
                    if (!w) return;
                    baseAtk += w.atk;
                    baseHp += w.hp;
                    weaponCounts[w.type] = (weaponCounts[w.type] |

| 0) + 1;
                });

                // 2. スキル・加護の合算
                const totalAura = (mod) => {
                    const base = (mod === "Normal")? env.mainAura : env.friendAura; // 簡易化
                    let boost = 0;
                    grid.forEach(w => { if(w && w.mod === mod && w.boost) boost += w.boost; });
                    return (1 + (base * (1 + boost/100)) / 100);
                };

                const nAuraMult = totalAura("Normal");
                const oAuraMult = totalAura("Omega");

                grid.forEach(w => {
                    if (!w) return;
                    // 攻撃枠の判定
                    if (w.mod === "Normal") normAtk += 20 * nAuraMult; // 仮のSlv15数値
                    if (w.mod === "Omega") omegaAtk += 20 * oAuraMult;
                    if (w.mod === "EX") exAtk += 25;
                    
                    // 特殊スキル
                    if (w.pact) pactDmg += w.pact;
                    if (w.resonance) {
                        const count = weaponCounts[w.resonance] |

| 0;
                        exAtk += Math.min(80, 4 * count * 1); // レゾナンス計算 [1]
                    }
                });

                // 3. 最終算出 (17500係数)
                const rawAtk = Math.floor((1 + baseAtk / 17500) * (1 + normAtk/100) * (1 + omegaAtk/100) * (1 + exAtk/100) * 1000);
                
                return { 
                    atk: rawAtk, 
                    hp: Math.floor(baseHp * (1 + (normAtk+omegaAtk)/200)), 
                    pact: Math.min(100000, pactDmg),
                    overCap: pactDmg > 100000
                };
            }, [grid, env]);

            const filteredWeapons = MASTER_LIST.filter(w => 
                (filterEl === "All" |

| w.el === filterEl |
| w.el === "全") &&
                w.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const addToGrid = (weapon) => {
                const emptyIdx = grid.findIndex(s => s === null);
                if (emptyIdx!== -1) {
                    const newGrid = [...grid];
                    newGrid[emptyIdx] = weapon;
                    setGrid(newGrid);
                }
            };

            return (
                <div className="max-w-[1400px] mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-blue-500">GBF SIM <span className="text-slate-500 text-xl font-normal not-italic ml-2">ULTIMATE V5</span></h1>
                            <p className="text-slate-400 text-xs mt-1 uppercase font-bold tracking-widest">Motocal-Based Calculation Engine</p>
                        </div>
                        <div className="flex flex-wrap gap-6 items-center">
                            <div className="text-center">
                                <p className="text-[10px] text-slate-500 font-bold">TOTAL RAW ATK</p>
                                <p className="text-4xl font-mono font-bold text-blue-400">{stats.atk.toLocaleString()}</p>
                            </div>
                            <div className="text-center">
                                <p className="text-[10px] text-slate-500 font-bold">EST. HP</p>
                                <p className="text-2xl font-mono font-bold text-emerald-400">{stats.hp.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左：環境・詳細ステータス */}
                        <div className="lg:col-span-3 space-y-6">
                            <section className="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                                <h3 className="text-sm font-bold mb-4 text-blue-300 uppercase tracking-wider">Environment</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-slate-500 block mb-2 font-bold">HP RATIO: {env.hp}%</label>
                                        <input type="range" className="w-full" value={env.hp} onChange={e => setEnv({...env, hp: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 block mb-1 font-bold">MAIN AURA (GOD/M3)</label>
                                        <select className="bg-slate-800 w-full p-2 text-xs rounded-lg border border-slate-700 outline-none" value={env.mainAura} onChange={e => setEnv({...env, mainAura: Number(e.target.value)})}>
                                            <option value="170">250超越 (170%)</option>
                                            <option value="150">5凸 (150%)</option>
                                            <option value="140">4凸 (140%)</option>
                                        </select>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                                <h3 className="text-sm font-bold mb-4 text-orange-300 uppercase tracking-wider">Cap Analysis</h3>
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center text-xs">
                                        <span className="text-slate-400">Pact (与ダメ上昇):</span>
                                        <span className={`font-mono font-bold ${stats.overCap? 'text-red-400' : 'text-slate-200'}`}>
                                            {stats.pact.toLocaleString()} / 100k
                                        </span>
                                    </div>
                                    <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-orange-500 transition-all" style={{width: `${(stats.pact/100000)*100}%`}}></div>
                                    </div>
                                    <p className="text-[9px] text-slate-500 italic mt-2">※約定スキルの上限は10万です [1]</p>
                                </div>
                            </section>
                        </div>

                        {/* 中央：グリッド (10スロット) */}
                        <div className="lg:col-span-6">
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-3 bg-slate-900/30 p-4 rounded-3xl border border-slate-800/50">
                                {grid.map((w, i) => (
                                    <div key={i} 
                                        onClick={() => {if(w){const n=[...grid]; n[i]=null; setGrid(n);}}}
                                        className={`group relative h-36 rounded-2xl border transition-all cursor-pointer overflow-hidden ${w? 'bg-slate-800 border-blue-500/50 shadow-blue-500/10 shadow-lg' : 'bg-slate-900/40 border-slate-800 border-dashed hover:bg-slate-800'}`}
                                    >
                                        <div className="absolute top-2 left-2 text-[8px] text-slate-600 font-black">SLOT {i+1}</div>
                                        {w? (
                                            <div className="flex flex-col h-full p-3 justify-center items-center text-center">
                                                <div className="text-[10px] font-black text-slate-100 leading-tight mb-2 uppercase">{w.name}</div>
                                                <div className="text-[8px] text-blue-400 font-bold bg-blue-900/30 px-2 py-0.5 rounded-full">{w.cat}</div>
                                                <div className="mt-2 text-[8px] text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">REMOVE?</div>
                                            </div>
                                        ) : (
                                            <div className="flex h-full items-center justify-center text-[10px] text-slate-700 font-bold">EMPTY</div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 右：武器ライブラリ（検索・フィルタ） */}
                        <div className="lg:col-span-3 flex flex-col h-[700px]">
                            <div className="mb-4 space-y-2">
                                <input 
                                    type="text" 
                                    placeholder="武器名で検索..." 
                                    className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-blue-500 transition-all shadow-inner"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                                <div className="flex gap-1 overflow-x-auto pb-2 no-scrollbar">
                                    {["All", "火", "水", "土", "風", "光", "闇"].map(el => (
                                        <button key={el} onClick={() => setFilterEl(el)} className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${filterEl === el? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                            {el}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                                {filteredWeapons.map(w => (
                                    <button 
                                        key={w.id} 
                                        onClick={() => addToGrid(w)}
                                        className="w-full text-left p-4 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 hover:bg-slate-800 transition-all group relative overflow-hidden"
                                    >
                                        <div className="flex justify-between items-start relative z-10">
                                            <div>
                                                <div className="text-xs font-black text-slate-200 group-hover:text-blue-400 transition-colors uppercase">{w.name}</div>
                                                <div className="text-[9px] text-slate-500 mt-1 font-bold">{w.el} / {w.type} / {w.cat}</div>
                                            </div>
                                            <div className="text-[9px] text-slate-600 font-mono">ATK {w.atk}</div>
                                        </div>
                                        <div className="absolute top-0 right-0 w-16 h-16 bg-blue-500/5 rounded-full -mr-8 -mt-8"></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
