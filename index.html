<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBF Grid Simulator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .weapon-grid-slot { aspect-ratio: 4 / 3; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 武器ライブラリの拡張データ
        const MASTER_WEAPONS = [
            // 火属性
            { id: "f1", name: "フェニックス・クレド", el: "火", type: "斧", cat: "マグナ3", atk: 2840, hp: 420, skills: "極意/背水" },
            { id: "f2", name: "ロード・オブ・フレイム", el: "火", type: "剣", cat: "リミテッド", atk: 3300, hp: 580, skills: "約定" },
            { id: "f3", name: "ケラク", el: "火", type: "斧", cat: "リミテッド", atk: 3100, hp: 600, skills: "進境/刹那" },
            { id: "f4", name: "エクス・ケラウノス", el: "火", type: "杖", cat: "六道・極", atk: 2900, hp: 400, skills: "EX攻刃" },
            { id: "f5", name: "滅尽剣", el: "火", type: "剣", cat: "レヴァンス", atk: 3200, hp: 450, skills: "防御/特殊" },
            // 水属性
            { id: "w1", name: "シュレディンガー", el: "水", type: "刀", cat: "レヴァンス", atk: 3150, hp: 440, skills: "奥義上限" },
            { id: "w2", name: "太歳精弓", el: "水", type: "弓", cat: "リミテッド", atk: 3050, hp: 520, skills: "技巧/攻刃" },
            { id: "w3", name: "ガリレオ・サイト", el: "水", type: "槍", cat: "リミテッド", atk: 3200, hp: 480, skills: "渾身/克己" },
            { id: "w4", name: "ワムデュス・ナイダリア", el: "水", type: "斧", cat: "アンセスタル", atk: 2750, hp: 410, skills: "与ダメ上昇" },
            { id: "w5", name: "ミスラ・クレド", el: "水", type: "短剣", cat: "マグナ3", atk: 2600, hp: 380, skills: "方陣/極意" },
            // 土属性
            { id: "e1", name: "一期一振", el: "土", type: "刀", cat: "リミテッド", atk: 3400, hp: 500, skills: "渾身/攻刃" },
            { id: "e2", name: "エーケイ・フォーエイ", el: "土", type: "銃", cat: "リミテッド", atk: 3600, hp: 450, skills: "乱舞/攻刃" },
            { id: "e3", name: "ガレヲン・ジョー", el: "土", type: "棍棒", cat: "アンセスタル", atk: 2900, hp: 420, skills: "奥義与ダメ" },
            { id: "e4", name: "パニッシュメント・クレド", el: "土", type: "格闘", cat: "マグナ3", atk: 2750, hp: 430, skills: "方陣/渾身" },
            // 風属性
            { id: "v1", name: "セッテ・ディ・スパーダ", el: "風", type: "剣", cat: "レヴァンス", atk: 2950, hp: 480, skills: "覚醒/剣数" },
            { id: "v2", name: "エターナル・ラヴ", el: "風", type: "短剣", cat: "リミテッド", atk: 3350, hp: 510, skills: "無双/攻刃" },
            { id: "v3", name: "虚無ノ哭風", el: "風", type: "槍", cat: "リミテッド", atk: 3100, hp: 550, skills: "渾身/恩寵" },
            { id: "v4", name: "イーウィヤ・ビーク", el: "風", type: "刀", cat: "アンセスタル", atk: 2850, hp: 400, skills: "アビ与ダメ" },
            // 光属性
            { id: "l1", name: "ハルモニア", el: "光", type: "竪琴", cat: "リミテッド", atk: 2650, hp: 380, skills: "約定/感応" },
            { id: "l2", name: "エデン", el: "光", type: "槍", cat: "リミテッド", atk: 3250, hp: 490, skills: "渾身/攻刃" },
            { id: "l3", name: "リンネ", el: "光", type: "弓", cat: "リミテッド", atk: 2900, hp: 420, skills: "アビ上限/技巧" },
            { id: "l4", name: "シンボロ・クレド", el: "光", type: "剣", cat: "マグナ3", atk: 2800, hp: 450, skills: "方陣/極意" },
            // 闇属性
            { id: "d1", name: "ペイン・アンド・ストレイン", el: "闇", type: "斧", cat: "リミテッド", atk: 3450, hp: 460, skills: "約定" },
            { id: "d2", name: "フォールン・ソード", el: "闇", type: "剣", cat: "リミテッド", atk: 3300, hp: 500, skills: "渾身/攻刃" },
            { id: "d3", name: "永遠の落款", el: "闇", type: "杖", cat: "リミテッド", atk: 2700, hp: 410, skills: "技巧/与ダメ" },
            { id: "d4", name: "フェディエル・スパイン", el: "闇", type: "剣", cat: "アンセスタル", atk: 3000, hp: 450, skills: "奥義与ダメ" },
            // 特殊
            { id: "s1", name: "絶対否定の剣", el: "全", type: "剣", cat: "終末", atk: 4350, hp: 820, skills: "神威/上限" },
            { id: "s2", name: "永遠拒絶の剣", el: "全", type: "剣", cat: "終末", atk: 4350, hp: 820, skills: "方陣神威/上限" },
            { id: "s3", name: "オメガソード", el: "全", type: "剣", cat: "オメガ", atk: 3800, hp: 700, skills: "闘争/強健" },
            { id: "s4", name: "バハムートソード・フツルス", el: "闇", type: "剣", cat: "バハ武器", atk: 4100, hp: 900, skills: "種族強化" }
        ];

        const ELEMENTS = ["すべて", "火", "水", "土", "風", "光", "闇"];

        function App() {
            const [grid, setGrid] = useState(Array(10).fill(null));
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedElement, setSelectedElement] = useState("すべて");
            
            // 計算ロジック
            const stats = useMemo(() => {
                let atk = 0;
                let hp = 0;
                grid.forEach(w => {
                    if (w) {
                        atk += w.atk;
                        hp += w.hp;
                    }
                });
                return { atk, hp };
            }, [grid]);

            const filteredWeapons = useMemo(() => {
                return MASTER_WEAPONS.filter(w => {
                    const matchesSearch = w.name.includes(searchTerm) || w.cat.includes(searchTerm);
                    const matchesElement = selectedElement === "すべて" || w.el === selectedElement || w.el === "全";
                    return matchesSearch && matchesElement;
                });
            }, [searchTerm, selectedElement]);

            const addToGrid = (weapon) => {
                const emptyIdx = grid.findIndex(slot => slot === null);
                if (emptyIdx !== -1) {
                    const newGrid = [...grid];
                    newGrid[emptyIdx] = { ...weapon, instanceId: Date.now() };
                    setGrid(newGrid);
                }
            };

            const removeFromGrid = (index) => {
                const newGrid = [...grid];
                newGrid[index] = null;
                setGrid(newGrid);
            };

            const clearGrid = () => setGrid(Array(10).fill(null));

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-slate-900/80 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                            <div>
                                <h1 className="text-3xl font-black italic tracking-tighter text-blue-500">GBF GRID SIM <span className="text-slate-500 text-sm not-italic font-medium ml-2">PRO VERSION</span></h1>
                                <p className="text-slate-400 text-xs mt-1">装備編成シミュレータ (武器ライブラリ拡充版)</p>
                            </div>
                            
                            <div className="flex gap-6">
                                <div className="text-right">
                                    <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Estimated ATK</p>
                                    <p className="text-4xl font-black font-mono text-blue-400 leading-none">{stats.atk.toLocaleString()}</p>
                                </div>
                                <div className="text-right border-l border-slate-800 pl-6">
                                    <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Estimated HP</p>
                                    <p className="text-4xl font-black font-mono text-emerald-400 leading-none">{stats.hp.toLocaleString()}</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* 左側：武器グリッド */}
                            <div className="lg:col-span-7">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <div className="w-2 h-6 bg-blue-600 rounded-full"></div>
                                        WEAPON GRID (10 SLOTS)
                                    </h2>
                                    <button onClick={clearGrid} className="text-xs text-slate-500 hover:text-red-400 transition-colors">全解除</button>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                    {grid.map((weapon, idx) => (
                                        <div 
                                            key={idx}
                                            onClick={() => weapon && removeFromGrid(idx)}
                                            className={`weapon-grid-slot relative group rounded-xl border-2 transition-all duration-200 cursor-pointer flex flex-col items-center justify-center p-2 text-center shadow-inner
                                                ${weapon 
                                                    ? 'bg-slate-800 border-blue-500/50 hover:border-red-500/50 hover:bg-slate-700' 
                                                    : 'bg-slate-900/40 border-slate-800 border-dashed hover:bg-slate-800/60'}`}
                                        >
                                            {weapon ? (
                                                <>
                                                    <div className={`absolute top-1 left-1 text-[8px] px-1.5 rounded-full font-bold
                                                        ${weapon.el === '火' ? 'bg-red-900/80 text-red-200' : 
                                                          weapon.el === '水' ? 'bg-blue-900/80 text-blue-200' :
                                                          weapon.el === '風' ? 'bg-green-900/80 text-green-200' :
                                                          weapon.el === '土' ? 'bg-orange-900/80 text-orange-200' :
                                                          weapon.el === '光' ? 'bg-yellow-800/80 text-yellow-100' :
                                                          weapon.el === '闇' ? 'bg-purple-900/80 text-purple-200' : 'bg-slate-700 text-white'}`}>
                                                        {weapon.el}
                                                    </div>
                                                    <div className="text-[10px] font-bold text-slate-200 line-clamp-2 mt-2 leading-tight">
                                                        {weapon.name}
                                                    </div>
                                                    <div className="text-[9px] text-blue-400 mt-1 font-medium">{weapon.cat}</div>
                                                    <div className="absolute inset-0 bg-red-600/10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity rounded-xl">
                                                        <span className="text-[10px] font-bold text-red-400">REMOVE</span>
                                                    </div>
                                                </>
                                            ) : (
                                                <div className="text-slate-700 text-[10px] font-black tracking-widest">EMPTY</div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 p-6 bg-slate-900/50 rounded-2xl border border-slate-800">
                                    <h3 className="text-sm font-bold text-slate-400 mb-4 flex items-center gap-2">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        編成要約
                                    </h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <div className="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                                            <p className="text-[10px] text-slate-500">武器数</p>
                                            <p className="text-lg font-bold">{grid.filter(w=>w).length} / 10</p>
                                        </div>
                                        <div className="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                                            <p className="text-[10px] text-slate-500">平均ATK</p>
                                            <p className="text-lg font-bold">
                                                {grid.filter(w=>w).length ? Math.round(stats.atk / grid.filter(w=>w).length).toLocaleString() : 0}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 右側：武器ライブラリ */}
                            <div className="lg:col-span-5 bg-slate-900 rounded-3xl border border-slate-800 flex flex-col h-[700px] overflow-hidden">
                                <div className="p-6 border-b border-slate-800">
                                    <h2 className="font-bold mb-4 flex items-center gap-2 text-slate-300">
                                        LIBRARY
                                        <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full">{filteredWeapons.length}</span>
                                    </h2>
                                    
                                    <input 
                                        type="text" 
                                        placeholder="武器名、シリーズ名で検索..."
                                        className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-600 mb-4"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />

                                    <div className="flex flex-wrap gap-1.5">
                                        {ELEMENTS.map(el => (
                                            <button 
                                                key={el}
                                                onClick={() => setSelectedElement(el)}
                                                className={`px-3 py-1 text-[10px] font-bold rounded-full transition-all 
                                                    ${selectedElement === el ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                            >
                                                {el}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {filteredWeapons.length > 0 ? (
                                        filteredWeapons.map(weapon => (
                                            <button 
                                                key={weapon.id}
                                                onClick={() => addToGrid(weapon)}
                                                className="w-full group text-left bg-slate-800/40 hover:bg-slate-800 p-4 rounded-2xl border border-slate-800/50 hover:border-blue-500/50 transition-all flex justify-between items-center"
                                            >
                                                <div>
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded uppercase
                                                            ${weapon.el === '火' ? 'text-red-400' : 
                                                              weapon.el === '水' ? 'text-blue-400' :
                                                              weapon.el === '風' ? 'text-green-400' :
                                                              weapon.el === '土' ? 'text-orange-400' :
                                                              weapon.el === '光' ? 'text-yellow-200' :
                                                              weapon.el === '闇' ? 'text-purple-400' : 'text-slate-400'}`}>
                                                            {weapon.el}
                                                        </span>
                                                        <span className="text-[10px] text-slate-500 font-bold">{weapon.cat}</span>
                                                    </div>
                                                    <div className="font-bold text-slate-200 group-hover:text-blue-400 transition-colors">
                                                        {weapon.name}
                                                    </div>
                                                    <div className="text-[10px] text-slate-500 mt-1">
                                                        ATK: {weapon.atk.toLocaleString()} / HP: {weapon.hp.toLocaleString()}
                                                    </div>
                                                </div>
                                                <div className="text-slate-700 group-hover:text-blue-600 transition-colors">
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                                </div>
                                            </button>
                                        ))
                                    ) : (
                                        <div className="text-center py-20 text-slate-600">
                                            <p className="text-sm italic">条件に一致する武器が見つかりません</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
